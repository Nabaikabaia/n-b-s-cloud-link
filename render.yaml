services:
  - type: web
    name: nabees-uploader
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /api/upload-from-url
        destination: https://aqrmhkzrrmpljrtknrpi.supabase.co/functions/v1/upload-from-url
      - type: rewrite
        source: /api/check-url-file
        destination: https://aqrmhkzrrmpljrtknrpi.supabase.co/functions/v1/check-url-file
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: NODE_VERSION
        value: 18
